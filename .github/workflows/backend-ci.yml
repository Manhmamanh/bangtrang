name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/server/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'packages/server/**'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: tppo_whiteboard_test
          POSTGRES_USER: whiteboard
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'packages/server/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: packages/server

      - name: Type check
        run: npm run type-check
        working-directory: packages/server
        continue-on-error: true

      - name: Lint
        run: npm run lint
        working-directory: packages/server
        continue-on-error: true

      - name: Run tests
        run: npm test
        working-directory: packages/server
        env:
          DATABASE_URL: postgresql://whiteboard:test_password@localhost:5432/tppo_whiteboard_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'packages/server/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: packages/server

      - name: Build
        run: npm run build
        working-directory: packages/server

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: backend-build
          path: packages/server/dist
          retention-days: 1
