services:
  # PostgreSQL Database
  - type: pserv
    name: bangtrang-db
    plan: free
    databaseName: bangtrang
    user: postgres
    region: singapore

  # Backend API Server (Minimal - Database optional)
  - type: web
    name: bangtrang-api
    plan: free
    runtime: node
    region: singapore
    startCommand: cd packages/server && npm run build && npm run start:minimal
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: bangtrang-db
          property: connectionString
      - key: REDIS_URL
        value: "redis://localhost:6379"

  # Frontend Web App
  - type: static
    name: bangtrang-web
    plan: free
    buildCommand: cd packages/client && npm install && npm run build
    staticPublishPath: packages/client/dist
    routes:
      - path: /api
        destination: https://bangtrang-api.onrender.com
      - path: /*
        destination: /index.html
